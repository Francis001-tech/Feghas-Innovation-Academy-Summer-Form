<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feghas Summer Camp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <div class="left">
             <div class="left_content">
            <div class="sub_left">
            <img src="summer-assets/feghas-Acad-White-Logo" alt="" class="logo_img">

            <nav>
                <button><a href="">Chat Us On Whatsapp</a></button>
                <button>Go To our Official Page</button>
            </nav>
            </div>

            <p>
                Feghas Innovation Academy is a home where 
                World Leaders and Tech Pioneers are been 
                groom, built and made. 
            </p>
            </div>

            <div class="sub_left_content">
                <h1>Every project starts with a plan.</h1>
               <div class="total_social">
                <div class="socials"><img src="summer-assets/instagram.png" alt=""></div>
                <div class="socials"><img src="summer-assets/facebook.png" alt=""></div>
                <div class="socials"><i+mg src="summer-assets/twitter.png" alt=""></div>
                <div class="socials"><img src="summer-assets/tik-tok.png" alt=""></div>
                </div>
            </div>
        </div>

        <div class="right">
            <h1>What services we can support  you with?</h1>

            <form action="">
                <h2>Section 1: Parent/Guardian Details</h2>

                <div class="form-group">
                    <label for="text">Full Name of Parent/Guardian:</label>
                    <input type="text"
                    required
                    placeholder="Enter your Name">
                </div>
                <div class="form-group">
                    <label for="text">Phone Number(WhatsApp preferred):</label>
                    <input type="tel"
                    required
                    placeholder="+234...">
                </div>
                <div class="form-group">
                    <label for="text">Email Address:</label>
                    <input type="email"
                    required
                    placeholder="example@email.com">
                </div>
                <div class="form-group">
                <label for="text">Home Address:</label>
                    <input type="text"
                    required
                    placeholder="Enter your Address">
                </div>

                <h2>Section 2: Child's Information</h2>
                 <div class="form-group">
                <label for="text">Child's Full Name:</label>
                    <input type="text"
                    required
                    placeholder="Enter your Ward's Name">
                </div>
                 <div class="form-group">
                <label for="text">Child's Age (Number):</label>
                    <input type="number"
                    required
                    placeholder="Enter your Ward's Age">
                </div>
                 <div class="form-group">
                <label for="text">Current Education Level:</label>
                    <input type="text"
                    required
                    placeholder="Class/Secondary School Level">
                </div>
                 <div class="form-group">
                <label for="text">Has your child had any prior exposure to tech-related activities?</label>
                   <select name="" id="">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                   </select>
                </div>
                <div class="form-group">
                <label for="text">Preferred Session?</label>
                   <select name="" id="">
                    <option value="1">Choose your Preferred Time:</option>
                    <option value="2">Morning 9am - 12:30pm</option>
                    <option value="3">Afternoon 1 - 4pm</option>
                   </select>
                </div>
                <div class="form-group">
                <label for="text">Course Preferences:</label>
                   <select name="" id="">
                    <option value="1">Web Development</option>
                    <option value="2">Python</option>
                    <option value="3">Scratch</option>
                    <option value="4">Graphic Design</option>
                    <option value="5">Computer Appreciation</option>
                    <option value="6">Data Analysis</option>
                    <option value="7">Video Editing</option>
                    <option value="8">Javascript</option>
                   </select>
                </div>
                <div class="form-group">
                <label for="text">Where did you Learn about the FIA Summer Tech Class?</label>
                   <select name="" id="">
                    <option value="1">WhatApp</option>
                    <option value="2">Youtube</option>
                    <option value="3">Instagram</option>
                    <option value="4">From A Friend</option>
                    <option value="5">Bill Board</option>
                    <option value="6">From A School</option>
                    <option value="7">Other</option>
                   </select>
                </div>
                <button type="submit">Submit</button>
            </form>
        </div>
    </div>
</body>
</html>
